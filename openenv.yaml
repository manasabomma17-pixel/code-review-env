name: code-review-env
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent acts as a code reviewer,
  identifying security vulnerabilities and bugs in realistic code diffs.

tags:
  - openenv
  - code-review
  - security

tasks:
  - id: easy
    description: "Review Python service with SQL injection and broken crypto"
    difficulty: easy
    grader: env.grader.grade_episode
    score_range: [0.01, 0.99]

  - id: medium
    description: "Review Express.js API with auth bypass and hardcoded secrets"
    difficulty: medium
    grader: env.grader.grade_episode
    score_range: [0.01, 0.99]

  - id: hard
    description: "Review concurrency utilities with race conditions and RCE"
    difficulty: hard
    grader: env.grader.grade_episode
    score_range: [0.01, 0.99]

entrypoint: app.py
inference: inference.py

observation_space:
  type: object

action_space:
  type: object

reward:
  type: dense
  range: [-1.0, 1.0]